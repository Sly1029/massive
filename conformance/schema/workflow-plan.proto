syntax = "proto3";

package massive.plan.v0;

option go_package = "github.com/Sly1029/massive/conformance/schema/planpb;planpb";

// Canonical backend-compiled plan boundary for Massive v0.
// Frontend SDKs emit WorkflowSpec JSON; the Go compiler emits this typed
// canonical JSON WorkflowPlan artifact.
//
// Encoding conventions (see workflow-plan-json-projection.md):
// - Every scalar field is `optional` (explicit presence) so canonical JSON
//   always carries set fields, including zero values like schemaVersion 0.
// - Repeated fields appear in canonical JSON only when non-empty; empty
//   lists are omitted, matching protojson's default marshaling.
// - Digests are `sha256:<hex>` strings; variant messages carry an explicit
//   `kind` string so the JSON stays self-describing.

message ArtifactRef {
  optional string key = 1;
  optional string hash = 2;
  optional string content_type = 3;
}

message WorkflowPlan {
  optional uint32 schema_version = 1;
  optional string plan_hash = 2;
  optional string spec_hash = 3;
  optional GraphIR graph = 4;
  repeated SchemaEntry schemas = 5;
  repeated SymbolEntry symbols = 6;
  repeated SourcePackageRef source_packages = 7;
  repeated MaterializedEnvironment environments = 8;
  repeated ExecutionContract contracts = 9;
  repeated TargetPlan targets = 10;
  repeated ArtifactRef datastore_manifests = 11;
  optional CompilerProvenance provenance = 12;
}

message GraphIR {
  optional string workflow_name = 1;
  optional string input_schema = 2;
  optional string output_schema = 3;
  optional string start_node = 4;
  optional string end_node = 5;
  repeated GraphNode nodes = 6;
  repeated GraphEdge edges = 7;
}

message GraphNode {
  optional string id = 1;
  // "start", "step", or "end". Fan-in steps list their merged upstream step
  // ids in merge_inputs; plain steps omit it (empty repeated fields are not
  // serialized).
  optional string kind = 2;
  optional string input_schema = 3;
  optional string output_schema = 4;
  optional string symbol_ref = 5;
  optional string contract_ref = 6;
  repeated string merge_inputs = 7;
}

message GraphEdge {
  optional string from = 1;
  optional string to = 2;
}

message SchemaEntry {
  optional string hash = 1;
  optional string canonical_json = 2;
}

message SymbolEntry {
  optional string symbol_ref = 1;
  optional string package_id = 2;
  optional string language = 3;
  optional string module = 4;
  optional string export = 5;
}

message SourcePackageRef {
  optional string package_id = 1;
  optional string language = 2;
  optional string package_hash = 3;
  optional ArtifactRef manifest = 4;
  optional ArtifactRef source_archive = 5;
}

message MaterializedEnvironment {
  optional string env_ref = 1;
  optional string spec_hash = 2;
  optional string kind = 3;
  optional ArtifactRef local = 4;
  optional ContainerRuntime container = 5;
}

message ContainerRuntime {
  optional string image = 1;
  optional ArtifactRef source_fetch = 2;
}

message ExecutionContract {
  optional string contract_ref = 1;
  optional string environment_ref = 2;
  optional ResourceRequirements resources = 3;
  repeated SecretRef secrets = 4;
  optional NetworkPolicy network = 5;
}

message ResourceRequirements {
  optional string cpu = 1;
  optional string memory = 2;
}

message SecretRef {
  optional string name = 1;
  optional string ref = 2;
}

message NetworkPolicy {
  // "none", "declared", or "any". When "declared", hosts lists the declared
  // egress destinations.
  optional string egress = 1;
  repeated string hosts = 2;
}

message TargetPlan {
  optional string kind = 1;
  optional string target_hash = 2;
  optional ArtifactRef bundle_manifest = 3;
}

message CompilerProvenance {
  optional string compiler_name = 1;
  optional string compiler_version = 2;
  optional string source_spec_hash = 3;
}
