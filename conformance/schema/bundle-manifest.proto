syntax = "proto3";

package massive.plan.v0;

import "workflow-plan.proto";

option go_package = "github.com/Sly1029/massive/conformance/schema/planpb;planpb";

// Target bundle manifest emitted by the Go compiler for local, Argo, and
// future backends. The bundle is target output; it is not the canonical
// WorkflowPlan.

message TargetBundleManifest {
  optional uint32 schema_version = 1;
  optional string target = 2;
  optional string plan_hash = 3;
  optional string bundle_hash = 4;
  repeated EmittedFile files = 5;
  repeated ValidationResult validations = 6;
  optional BundleProvenance provenance = 7;
}

message EmittedFile {
  optional string path = 1;
  optional ArtifactRef artifact = 2;
  optional string role = 3;
}

message ValidationResult {
  optional string name = 1;
  optional bool passed = 2;
  optional string diagnostic = 3;
}

message BundleProvenance {
  optional string compiler_name = 1;
  optional string compiler_version = 2;
}
