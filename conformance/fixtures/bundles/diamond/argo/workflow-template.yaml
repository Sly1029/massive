apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  annotations:
    massive.dev/plan-hash: sha256:3b404991915f640e1f596518c3cd04ce5653df3960aa9b3af9a224226ec960de
  name: diamond
  namespace: argo
spec:
  arguments:
    parameters:
    - name: datastore-kind
    - name: datastore-path
    - name: project-id
  entrypoint: main
  serviceAccountName: argo
  templates:
  - dag:
      tasks:
      - name: split
        template: step-split
      - dependencies:
        - split
        name: left
        template: step-left
      - dependencies:
        - split
        name: right
        template: step-right
      - dependencies:
        - left
        - right
        name: merge
        template: step-merge
      - dependencies:
        - merge
        name: wf-system-finalize
        template: wf-system-finalize
    name: main
  - container:
      args:
      - --node
      - split
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:3b404991915f640e1f596518c3cd04ce5653df3960aa9b3af9a224226ec960de
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-split
  - container:
      args:
      - --node
      - left
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:3b404991915f640e1f596518c3cd04ce5653df3960aa9b3af9a224226ec960de
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-left
  - container:
      args:
      - --node
      - right
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:3b404991915f640e1f596518c3cd04ce5653df3960aa9b3af9a224226ec960de
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-right
  - container:
      args:
      - --node
      - merge
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:3b404991915f640e1f596518c3cd04ce5653df3960aa9b3af9a224226ec960de
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-merge
  - container:
      args:
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:3b404991915f640e1f596518c3cd04ce5653df3960aa9b3af9a224226ec960de
      command:
      - massive-orchestrator
      - finalize
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
    name: wf-system-finalize
