apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  annotations:
    massive.dev/plan-hash: sha256:8d50c2aa7031ec9a7cda399d233a4356bbea8f6ac3fd61c5f79391d6be6bee3c
  name: linear-chain
  namespace: argo
spec:
  arguments:
    parameters:
    - name: datastore-kind
    - name: datastore-path
    - name: project-id
  entrypoint: main
  serviceAccountName: argo
  templates:
  - dag:
      tasks:
      - name: double
        template: step-double
      - dependencies:
        - double
        name: increment
        template: step-increment
      - dependencies:
        - increment
        name: label
        template: step-label
      - dependencies:
        - double
        - increment
        - label
        name: wf-system-finalize
        template: wf-system-finalize
    name: main
  - container:
      args:
      - --node
      - double
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:8d50c2aa7031ec9a7cda399d233a4356bbea8f6ac3fd61c5f79391d6be6bee3c
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-double
  - container:
      args:
      - --node
      - increment
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:8d50c2aa7031ec9a7cda399d233a4356bbea8f6ac3fd61c5f79391d6be6bee3c
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-increment
  - container:
      args:
      - --node
      - label
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:8d50c2aa7031ec9a7cda399d233a4356bbea8f6ac3fd61c5f79391d6be6bee3c
      command:
      - massive-orchestrator
      - step
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 500m
          memory: 512Mi
    name: step-label
  - container:
      args:
      - --run-id
      - '{{workflow.uid}}'
      - --plan-hash
      - sha256:8d50c2aa7031ec9a7cda399d233a4356bbea8f6ac3fd61c5f79391d6be6bee3c
      command:
      - massive-orchestrator
      - finalize
      env:
      - name: MASSIVE_DATASTORE_KIND
        value: '{{workflow.parameters.datastore-kind}}'
      - name: MASSIVE_DATASTORE_PATH
        value: '{{workflow.parameters.datastore-path}}'
      - name: MASSIVE_PROJECT_ID
        value: '{{workflow.parameters.project-id}}'
      image: ghcr.io/massive-dev/typescript-runner:v0
    name: wf-system-finalize
